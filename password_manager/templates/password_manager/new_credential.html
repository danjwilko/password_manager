{% extends 'password_manager/base.html' %}
{% block page_header %}
    <h2 class="h2">Add New Credential</h2>
{% endblock page_header %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-sm-12 col-md-10 col-lg-8">
            <div class="bg-light mb-3 p-4 rounded-1 shadow-sm">
    <div class="alert alert-info" role="alert">
    <strong>Info:</strong> Please fill out the form below to add a new credential to your password manager.
    </div>
    <form action="{% url 'password_manager:new_credential' %}" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="mt-3">
        <button class="btn btn-primary m-1" name="submit">Add Credential</button>
        <button type="button" class="btn btn-warning m-1" onclick="location.href='{% url 'password_manager:credential' %}'">Cancel</button>
        </div>
    </form>
    </div>
    </div>
    </div>

{% endblock content %}
