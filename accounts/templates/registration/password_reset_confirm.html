{% extends "password_manager/base.html" %}
{% load django_bootstrap5 %}

{% block page_header %}
    <h2 class="h2">Change Password</h2>
    <hr>
{% endblock page_header %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-sm-12 col-md-10 col-lg-8">
            <div class="bg-light mb-3 p-4 rounded-1 shadow-sm">
                
    <div class="alert alert-info">
    Please enter a new password below.
    </div>
    <hr class="mb-4">
    <form method="post">
        {% csrf_token %}
        {% bootstrap_form form %}
        <div class="mt-3">
        <button type="submit" class="btn btn-success">Change Password</button>
        <button type="button" class="btn btn-secondary" onclick="location.href='{% url 'accounts:login' %}'">Cancel</button>
        </div>
    </form>
    </div>
    </div>
    

    {% endblock content %}
